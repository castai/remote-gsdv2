apiVersion: v1
kind: Secret
metadata:
  name: {{ include "gsd-remote.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gsd-remote.labels" . | nindent 4 }}
type: Opaque
stringData:
  # GSD auth.json — assembled from individual tokens
  auth.json: |
    {
      {{- $entries := list }}
      {{- if .Values.kimchiToken }}
      {{- $entries = append $entries (printf "\"aie\": {\"type\": \"api_key\", \"key\": \"%s\"}" .Values.kimchiToken) }}
      {{- end }}
      {{- if .Values.tavilyAPIKey }}
      {{- $entries = append $entries (printf "\"tavily\": {\"type\": \"api_key\", \"key\": \"%s\"}" .Values.tavilyAPIKey) }}
      {{- end }}
      {{ join ",\n      " $entries }}
    }
  {{- if .Values.githubPAT }}
  github-pat: {{ .Values.githubPAT | quote }}
  {{- end }}
  {{- if .Values.braveAPIKey }}
  brave-api-key: {{ .Values.braveAPIKey | quote }}
  {{- end }}
  {{- if .Values.modelsJSON }}
  models.json: {{ .Values.modelsJSON | quote }}
  {{- end }}
  {{- if .Values.preferencesMD }}
  preferences.md: {{ .Values.preferencesMD | quote }}
  {{- end }}
  {{- if .Values.projectEnv }}
  project.env: {{ .Values.projectEnv | quote }}
  {{- end }}
