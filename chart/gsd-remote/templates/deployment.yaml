{{- $fullName := include "gsd-remote.fullname" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ $fullName }}
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gsd-remote.labels" . | nindent 4 }}
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      {{- include "gsd-remote.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "gsd-remote.selectorLabels" . | nindent 8 }}
        gsd/project: {{ .Values.projectName }}
      annotations:
        checksum/secrets: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
    spec:
      {{- if .Values.rbac.enabled }}
      serviceAccountName: {{ include "gsd-remote.fullname" . }}
      {{- end }}
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: init
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -e

              # ── Seed home directory PVC from image skeleton on first boot ──
              # The PVC mounts over /home/gsd, hiding image contents.
              # /home/gsd.skel (baked into the image) has the full home dir snapshot.
              SENTINEL="/home/gsd/.home-initialized"
              if [ ! -f "${SENTINEL}" ]; then
                echo "[init] First boot — seeding /home/gsd from image skeleton..."
                cp -a /home/gsd.skel/. /home/gsd/
                touch "${SENTINEL}"
                echo "[init] ✓ Home directory seeded"
              else
                echo "[init] Home directory already initialized, skipping seed"
              fi

              # ── Ensure directory structure exists ──
              mkdir -p /home/gsd/.gsd/agent /home/gsd/.ssh /home/gsd/go
              chmod 700 /home/gsd/.ssh

              # ── Write secrets to PVC (always overwrite — secret is source of truth) ──

              {{- if .Values.githubPAT }}
              echo "https://x-access-token:$(cat /secrets/github-pat)@github.com" > /home/gsd/.git-credentials
              chmod 600 /home/gsd/.git-credentials
              {{- end }}

              {{- if .Values.modelsJSON }}
              cp /secrets/models.json /home/gsd/.gsd/agent/models.json
              {{- end }}

              {{- if .Values.preferencesMD }}
              cp /secrets/preferences.md /home/gsd/.gsd/agent/PREFERENCES.md
              {{- end }}

              {{- if .Values.projectEnv }}
              # Stage project .env — entrypoint copies it into the workspace after clone.
              # Can't write directly to workspace target because the repo dir may not exist yet.
              cp /secrets/project.env /home/gsd/.staged-project-env
              {{- end }}

              # ── Fix ownership on both PVCs ──
              chown -R 1000:1000 /home/gsd /workspace

              echo "[init] ✓ init complete"
          volumeMounts:
            - name: gsd-home
              mountPath: /home/gsd
            - name: workspace
              mountPath: /workspace
            - name: secrets
              mountPath: /secrets
              readOnly: true
      containers:
        - name: gsd
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: WORKSPACE
              value: "/workspace/{{ .Values.projectName }}"
            - name: GIT_REPO
              value: {{ .Values.gitRepo | quote }}
            {{- if .Values.gitBranch }}
            - name: GIT_BRANCH
              value: {{ .Values.gitBranch | quote }}
            {{- end }}
            - name: PROJECT_NAME
              value: {{ .Values.projectName | quote }}
            - name: NODE_ENV
              value: "production"
            - name: TERM
              value: "xterm-256color"
            {{- if .Values.braveAPIKey }}
            - name: BRAVE_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ $fullName }}-secrets
                  key: brave-api-key
            {{- end }}
            {{- range $key, $value := .Values.extraEnv }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          volumeMounts:
            - name: gsd-home
              mountPath: /home/gsd
            - name: workspace
              mountPath: /workspace
            - name: auth
              mountPath: /home/gsd/.gsd/agent/auth.json
              subPath: auth.json
              readOnly: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          livenessProbe:
            exec:
              command: ["tmux", "has-session", "-t", "gsd"]
            initialDelaySeconds: 30
            periodSeconds: 30
            failureThreshold: 5
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: {{ $fullName }}-workspace
        - name: gsd-home
          persistentVolumeClaim:
            claimName: {{ $fullName }}-gsd-home
        - name: secrets
          secret:
            secretName: {{ $fullName }}-secrets
        - name: auth
          secret:
            secretName: {{ $fullName }}-secrets
            items:
              - key: auth.json
                path: auth.json
