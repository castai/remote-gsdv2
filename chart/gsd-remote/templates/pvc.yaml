apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: {{ include "gsd-remote.fullname" . }}-home
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "gsd-remote.labels" . | nindent 4 }}
  annotations:
    # Survive `helm uninstall` — the home directory holds session state, models,
    # auth, oh-my-zsh, cargo/rustup, the cloned repo, and .gsd/ artifacts.
    # Use the deploy script's `nuke` subcommand to delete the PVC explicitly.
    helm.sh/resource-policy: keep
spec:
  accessModes:
    - ReadWriteOnce
  storageClassName: {{ .Values.persistence.storageClass }}
  resources:
    requests:
      storage: {{ .Values.persistence.size }}
