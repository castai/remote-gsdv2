# GSD auth tokens — create with:
#   kubectl create secret generic gsd-auth \
#     --namespace=lk-gsd \
#     --from-file=auth.json=$HOME/.gsd/agent/auth.json
#
# auth.json contains provider API keys (anthropic, openai, etc.)
# The secret is mounted into the pod at /home/gsd/.gsd/agent/auth.json
apiVersion: v1
kind: Secret
metadata:
  name: gsd-auth
  namespace: lk-gsd
type: Opaque
# data populated via kubectl create secret (not checked into git)
