apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: gsd-agent
  namespace: lk-gsd
  labels:
    app: gsd-agent
spec:
  serviceName: gsd-agent
  replicas: 1
  selector:
    matchLabels:
      app: gsd-agent
  template:
    metadata:
      labels:
        app: gsd-agent
    spec:
      terminationGracePeriodSeconds: 30
      securityContext:
        fsGroup: 1000
      initContainers:
        - name: fix-perms
          image: busybox:1.37
          command: ["sh", "-c", "chown -R 1000:1000 /workspace /home/gsd/.gsd"]
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: gsd-home
              mountPath: /home/gsd/.gsd
      containers:
        - name: gsd
          image: us-central1-docker.pkg.dev/demos-321800/agents/gsd-remote:latest
          env:
            - name: WORKSPACE
              value: "/workspace/dev_root/oc-salesanalyzer-control"
            - name: NODE_ENV
              value: "production"
            - name: TERM
              value: "xterm-256color"
          volumeMounts:
            - name: workspace
              mountPath: /workspace
            - name: gsd-home
              mountPath: /home/gsd/.gsd
            - name: gsd-auth
              mountPath: /home/gsd/.gsd/agent/auth.json
              subPath: auth.json
              readOnly: true
          resources:
            requests:
              cpu: "1"
              memory: 2Gi
            limits:
              cpu: "4"
              memory: 8Gi
          # Simple liveness: is the entrypoint still running?
          livenessProbe:
            exec:
              command: ["tmux", "has-session", "-t", "gsd"]
            initialDelaySeconds: 15
            periodSeconds: 30
      volumes:
        - name: workspace
          persistentVolumeClaim:
            claimName: gsd-workspace
        - name: gsd-home
          persistentVolumeClaim:
            claimName: gsd-home
        - name: gsd-auth
          secret:
            secretName: gsd-auth
